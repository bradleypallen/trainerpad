<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TrainerPad</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="TrainerPad" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%232a78d6'/%3E%3Ctext x='90' y='118' font-family='-apple-system,sans-serif' font-size='72' font-weight='700' fill='white' text-anchor='middle'%3ETP%3C/text%3E%3C/svg%3E" />
<style>
:root {
  --surface-1: #fcfcfb;
  --page: #f9f9f7;
  --ink: #0b0b0b;
  --ink-2: #52514e;
  --muted: #898781;
  --grid: #e1e0d9;
  --baseline: #c3c2b7;
  --border: rgba(11,11,11,0.10);
  --accent: #2a78d6;
  --accent-ink: #ffffff;
  --good: #006300;
  --bad: #d03b3b;
  --warn-bg: #fdf3ec;
  --warn-border: #ec835a;
  --danger: #d03b3b;
  --wash: rgba(42,120,214,0.10);
}
@media (prefers-color-scheme: dark) {
  :root {
    --surface-1: #1a1a19;
    --page: #0d0d0d;
    --ink: #ffffff;
    --ink-2: #c3c2b7;
    --muted: #898781;
    --grid: #2c2c2a;
    --baseline: #383835;
    --border: rgba(255,255,255,0.10);
    --accent: #3987e5;
    --good: #0ca30c;
    --warn-bg: #2a1f18;
    --wash: rgba(57,135,229,0.12);
  }
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  background: var(--page); color: var(--ink);
  -webkit-text-size-adjust: 100%;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.app { max-width: 860px; margin: 0 auto; padding: 0 16px 48px; }
.loading { padding: 48px; text-align: center; color: var(--muted); }

.topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 0 10px; flex-wrap: wrap; }
.brand { font-weight: 700; font-size: 19px; display: flex; align-items: center; gap: 8px; }
.brand-mark { background: var(--accent); color: var(--accent-ink); border-radius: 9px; padding: 3px 7px; font-size: 14px; }
.topnav { display: flex; gap: 4px; }

.tabs { display: flex; gap: 4px; margin: 18px 0 14px; border-bottom: 1px solid var(--grid); }
.tab {
  appearance: none; border: none; background: none; color: var(--ink-2);
  font-size: 16px; padding: 10px 14px; border-radius: 10px 10px 0 0; cursor: pointer;
  border-bottom: 2.5px solid transparent; min-height: 44px;
}
.tab.on { color: var(--ink); font-weight: 600; border-bottom-color: var(--accent); }
.topnav .tab { border-radius: 10px; border-bottom: none; }
.topnav .tab.on { background: var(--surface-1); box-shadow: inset 0 0 0 1px var(--border); }

h2 { margin: 0 0 4px; font-size: 22px; }
h3 { margin: 0 0 10px; font-size: 16px; }
.muted { color: var(--ink-2); }
.small { font-size: 13px; }
.row-between { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 14px 0; flex-wrap: wrap; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

button { font-family: inherit; font-size: 16px; cursor: pointer; min-height: 44px; }
.btn-primary {
  background: var(--accent); color: var(--accent-ink); border: none;
  border-radius: 12px; padding: 10px 18px; font-weight: 600;
}
.btn-primary:disabled { opacity: 0.4; }
.btn-secondary {
  background: var(--surface-1); color: var(--ink); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 16px;
}
.btn-ghost { background: none; border: none; color: var(--ink-2); padding: 8px 10px; border-radius: 10px; }
.btn-danger { background: none; border: 1px solid var(--danger); color: var(--danger); border-radius: 12px; padding: 9px 14px; }
.btn-danger.armed { background: var(--danger); color: #fff; }
.btn-sm { min-height: 36px; font-size: 14px; padding: 6px 10px; }
.back { margin: 10px 0 2px; padding-left: 0; font-size: 16px; }

.search { flex: 1; max-width: 340px; }
input, select, textarea {
  font-family: inherit; font-size: 16px; color: var(--ink);
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px; width: 100%; min-height: 44px;
}
textarea { min-height: 60px; resize: vertical; }
select { -webkit-appearance: none; appearance: none; }

.field { display: block; margin-bottom: 14px; }
.field-label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-2); margin-bottom: 5px; }
.field-hint { display: block; font-size: 12px; color: var(--muted); margin-top: 4px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 14px; }
@media (max-width: 540px) { .grid2 { grid-template-columns: 1fr; } }

.card {
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; margin: 12px 0;
}
.list-row {
  display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px; margin: 8px 0; color: var(--ink);
}
.list-main { font-weight: 600; font-size: 16px; }
.list-sub { color: var(--ink-2); font-size: 14px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.client-row .list-main { min-width: 140px; }

.avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; }
.avatar.sm { width: 40px; height: 40px; }
.avatar-blank {
  display: flex; align-items: center; justify-content: center;
  background: var(--wash); color: var(--accent); font-weight: 700; font-size: 20px;
}
.client-head { display: flex; align-items: center; gap: 14px; margin: 12px 0; flex-wrap: wrap; }
.client-head-info { flex: 1; min-width: 200px; }
.note-strip {
  background: var(--warn-bg); border: 1px solid var(--warn-border);
  border-radius: 12px; padding: 10px 14px; margin: 10px 0; font-size: 14px;
}

.chip-row { display: inline-flex; gap: 6px; align-items: center; }
.chip-row.wrap { flex-wrap: wrap; display: flex; }
.filter-row { margin: 6px 0 12px; }
.chip {
  display: inline-block; font-size: 13px; border-radius: 999px; padding: 4px 11px;
  background: var(--page); border: 1px solid var(--border); color: var(--ink-2);
}
.chip-injury { border-color: var(--warn-border); color: var(--ink-2); }
.chip-blue { background: var(--wash); color: var(--accent); border-color: transparent; }
.chip-gray { }
.chip-toggle { cursor: pointer; min-height: 36px; }
.chip-toggle.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }

.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin: 12px 0; }
.stat-tile { background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; }
.stat-label { font-size: 13px; color: var(--ink-2); }
.stat-value { font-size: 26px; font-weight: 650; margin-top: 2px; }
.stat-unit { font-size: 14px; font-weight: 400; color: var(--muted); }
.stat-delta { font-size: 12.5px; margin-top: 2px; }
.delta-good { color: var(--good); }
.delta-bad { color: var(--bad); }
.delta-neutral { color: var(--muted); }

.rec-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin: 10px 0; }
.rec-card.warn { border-color: var(--warn-border); background: var(--warn-bg); }
.rec-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.rec-rx { font-weight: 650; font-size: 17px; }
.rec-why { color: var(--ink-2); font-size: 14px; margin-top: 4px; }
.warn-text { color: var(--ink); }
.rec-switch { margin-top: 6px; font-size: 14.5px; }
.rec-links { margin-top: 6px; }

.entry-card { background: var(--page); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin: 10px 0; }
.entry-head { display: flex; justify-content: space-between; align-items: center; }
.rec-line { font-size: 13.5px; color: var(--ink-2); margin: 4px 0; }
.rec-line.warn { color: var(--ink); background: var(--warn-bg); border-radius: 8px; padding: 6px 9px; }
.hist-line { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
.set-table { margin-top: 6px; }
.set-row { display: grid; grid-template-columns: 34px 1fr 1fr 84px 40px; gap: 8px; align-items: center; margin: 6px 0; }
.set-row:has(> :nth-child(4):last-child) { grid-template-columns: 34px 1fr 84px 40px; }
.set-head { font-size: 12px; color: var(--muted); font-weight: 600; min-height: 0; }
.set-head span { min-height: 0; }
.set-num { text-align: center; color: var(--muted); }

.picker-controls { margin-bottom: 10px; display: grid; gap: 10px; }
.picker-group h3 { margin: 14px 0 6px; color: var(--ink-2); }
.picker-row {
  display: flex; justify-content: space-between; gap: 10px; width: 100%; text-align: left;
  background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 12px; margin: 5px 0; color: var(--ink); align-items: center;
}
.picker-row.caution { border-color: var(--warn-border); }
.picker-name { font-weight: 550; }
.picker-rec { color: var(--ink-2); font-size: 13px; text-align: right; }

.lib-row { display: flex; gap: 10px; align-items: center; padding: 7px 0; border-top: 1px solid var(--grid); }
.lib-row:first-of-type { border-top: none; }
.lib-level { width: 22px; text-align: center; color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
.lib-name { font-weight: 500; flex-shrink: 0; }
.lib-meta { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.modal-scrim {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50;
  display: flex; align-items: flex-start; justify-content: center; padding: 4vh 12px;
  overflow-y: auto;
}
.modal {
  background: var(--page); border-radius: 18px; width: 100%; max-width: 520px;
  max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
  border: 1px solid var(--border);
}
.modal-wide { max-width: 680px; }
.modal-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px 8px; position: sticky; top: 0; background: var(--page); z-index: 2;
}
.modal-body { padding: 6px 18px 18px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

.empty-note { text-align: center; color: var(--ink-2); padding: 34px 20px; background: var(--surface-1); border: 1px dashed var(--baseline); border-radius: 14px; margin: 14px 0; }
.ok-note { color: var(--good); font-size: 14px; }
.photo-preview img { max-width: 120px; border-radius: 12px; display: block; margin-bottom: 6px; }

/* Charts */
.chart-card h3 { margin-bottom: 4px; }
.chart-wrap { position: relative; margin-top: 8px; }
.chart-empty { color: var(--muted); padding: 26px 6px; font-size: 14px; }
.gridline { stroke: var(--grid); stroke-width: 1; }
.baseline { stroke: var(--baseline); stroke-width: 1; }
.axis-text { fill: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }
.series-line { stroke: var(--accent); stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
.area-wash { fill: var(--accent); opacity: 0.10; }
.marker { fill: var(--accent); stroke: var(--surface-1); stroke-width: 2; }
.crosshair { stroke: var(--baseline); stroke-width: 1; }
.end-label { fill: var(--ink); font-size: 12px; font-weight: 600; }
.chart-tip {
  position: absolute; top: -6px; transform: translateX(-50%);
  background: var(--ink); color: var(--page); border-radius: 8px;
  padding: 4px 10px; font-size: 12.5px; pointer-events: none; white-space: nowrap;
}
.chart-tip .tip-value { font-weight: 700; margin-right: 6px; }
.table-view { margin-top: 8px; }
.table-view summary { color: var(--ink-2); font-size: 13.5px; cursor: pointer; min-height: 32px; }
.table-view table { border-collapse: collapse; font-size: 13.5px; margin-top: 6px; }
.table-view th, .table-view td { text-align: left; padding: 4px 14px 4px 0; border-bottom: 1px solid var(--grid); font-variant-numeric: tabular-nums; }
</style>
